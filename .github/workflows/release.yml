name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # Trusted Publishing (OIDC) needs a recent npm; the bundled one may be older.
      - run: npm install -g npm@latest
      - run: npm ci
      # No token: auth comes from the OIDC id-token via the npm Trusted Publisher
      # configured for this repo + workflow. Provenance is attached automatically.
      - run: npm publish --provenance --access public
